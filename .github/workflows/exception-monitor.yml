name: Azure Exception Monitor

on:
  schedule:
    - cron: '0 7 * * 1-5'  # Weekdays at 7 AM UTC
  workflow_dispatch:
    inputs:
      hours_back:
        description: "Hours to look back for exceptions"
        required: false
        default: "24"
        type: string

jobs:
  analyze-exceptions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: >
            {
              "clientId": "${{ vars.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ vars.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ vars.AZURE_TENANT_ID }}"
            }

      - name: Verify Azure CLI access to Log Analytics
        run: |
          echo "Verifying access to Log Analytics workspace..."
          az monitor log-analytics workspace show \
            --resource-group "${{ vars.LOG_ANALYTICS_RESOURCE_GROUP }}" \
            --workspace-name "${{ vars.LOG_ANALYTICS_NAME }}" \
            --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --query "{name:name, id:customerId, sku:sku.name}" \
            --output table

      - name: Fetch exceptions from Log Analytics
        id: fetch
        run: |
          HOURS_BACK="${{ inputs.hours_back || '24' }}"
          WORKSPACE="${{ vars.AZURE_LOG_ANALYTICS_WORKSPACE_ID }}"
          echo "Querying exceptions from the last ${HOURS_BACK} hours..."

          # List all tables in the workspace and pick the right exceptions table.
          # az monitor log-analytics query always returns exit code 0 even on
          # semantic errors, so we list tables via the management API instead.
          TABLES=$(az monitor log-analytics workspace table list \
            --resource-group "${{ vars.LOG_ANALYTICS_RESOURCE_GROUP }}" \
            --workspace-name "${{ vars.LOG_ANALYTICS_NAME }}" \
            --query "[].name" \
            --output tsv 2>/dev/null || echo "")

          TABLE=""
          for CANDIDATE in AppExceptions exceptions; do
            if echo "$TABLES" | grep -qx "$CANDIDATE"; then
              TABLE="$CANDIDATE"
              echo "Found table: ${TABLE}"
              break
            fi
          done

          if [ -z "$TABLE" ]; then
            echo "::error::Neither AppExceptions nor exceptions table found in workspace. Available tables:"
            echo "$TABLES"
            echo "exception_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "table=${TABLE}" >> "$GITHUB_OUTPUT"

          # Build query using the correct column names for each schema.
          if [ "$TABLE" = "AppExceptions" ]; then
            QUERY="${TABLE}
              | where TimeGenerated > ago(${HOURS_BACK}h)
              | project TimeGenerated, ExceptionType, Method, OuterMessage, InnermostMessage, Assembly, SeverityLevel, AppRoleName, OperationName
              | order by TimeGenerated desc
              | take 100"
          else
            QUERY="${TABLE}
              | where timestamp > ago(${HOURS_BACK}h)
              | project timestamp, type, method, outerMessage, innermostMessage, assembly, severityLevel, cloud_RoleName, operation_Name
              | order by timestamp desc
              | take 100"
          fi

          az monitor log-analytics query \
            --workspace "$WORKSPACE" \
            --analytics-query "$QUERY" \
            --output json > exceptions.json

          COUNT=$(python3 -c "
          import json
          data = json.load(open('exceptions.json'))
          rows = data if isinstance(data, list) else data.get('tables', [{}])[0].get('rows', [])
          print(len(rows))
          " 2>/dev/null || echo "0")

          echo "Found ${COUNT} exceptions in '${TABLE}'"
          echo "exception_count=${COUNT}" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -eq 0 ]; then
            echo "No exceptions found in the last ${HOURS_BACK} hours — skipping analysis."
          fi

      - name: Analyze exceptions and create issue + PR with Claude
        if: steps.fetch.outputs.exception_count != '0'
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        env:
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          AZURE_LOG_ANALYTICS_WORKSPACE_ID: ${{ vars.AZURE_LOG_ANALYTICS_WORKSPACE_ID }}
          LOG_ANALYTICS_NAME: ${{ vars.LOG_ANALYTICS_NAME }}
          LOG_ANALYTICS_RESOURCE_GROUP: ${{ vars.LOG_ANALYTICS_RESOURCE_GROUP }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          HOURS_BACK: ${{ inputs.hours_back || '24' }}
          EXCEPTIONS_TABLE: ${{ steps.fetch.outputs.table }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --dangerously-skip-permissions
          prompt: |
            You are connected to Azure and the Azure CLI is already authenticated.
            Your task is to analyze exceptions from Azure Log Analytics and create a
            GitHub issue summarizing the findings, then open a PR with code fixes where possible.

            ## Step 1 — Read the fetched exceptions

            The initial exception data has already been fetched and saved to `exceptions.json`.
            Start by reading it:
            ```
            cat exceptions.json
            ```

            ## Step 2 — Run follow-up Log Analytics queries

            Use the Azure CLI to dig deeper. The workspace ID is in $AZURE_LOG_ANALYTICS_WORKSPACE_ID.
            Example queries you should run:

            The exceptions table in use is: **$EXCEPTIONS_TABLE**

            Use the correct column names depending on the table:
            - `AppExceptions`: TimeGenerated, ExceptionType, Method, OuterMessage, InnermostMessage, Assembly, SeverityLevel, AppRoleName, OperationName
            - `exceptions` (classic): timestamp, type, method, outerMessage, innermostMessage, assembly, severityLevel, cloud_RoleName, operation_Name

            **Exception frequency by type:**
            ```
            az monitor log-analytics query \
              --workspace "$AZURE_LOG_ANALYTICS_WORKSPACE_ID" \
              --analytics-query "$EXCEPTIONS_TABLE | where TimeGenerated > ago(${HOURS_BACK}h) | summarize count=count(), last_seen=max(TimeGenerated) by ExceptionType, OuterMessage | order by count desc" \
              --output json
            ```

            **Exception trend over time:**
            ```
            az monitor log-analytics query \
              --workspace "$AZURE_LOG_ANALYTICS_WORKSPACE_ID" \
              --analytics-query "$EXCEPTIONS_TABLE | where TimeGenerated > ago(${HOURS_BACK}h) | summarize count=count() by bin(TimeGenerated, 1h), ExceptionType | order by TimeGenerated asc" \
              --output json
            ```

            **Affected operations/endpoints:**
            ```
            az monitor log-analytics query \
              --workspace "$AZURE_LOG_ANALYTICS_WORKSPACE_ID" \
              --analytics-query "$EXCEPTIONS_TABLE | where TimeGenerated > ago(${HOURS_BACK}h) | summarize count=count() by OperationName, AppRoleName, ExceptionType | order by count desc" \
              --output json
            ```

            Adjust column names in your queries to match the actual table schema if needed.

            Run any additional queries you need to fully understand the root causes.

            ## Step 3 — Analyze the codebase

            Look through the repository source code to find methods and files related
            to the exception types and operation names you found. Use this to determine
            whether a code fix is possible.

            ## Step 4 — Create a GitHub issue

            Create an issue with the following structure:
            - **Title:** `[Exception Report] <date> — <top exception types>`
            - **Body:**
              - Summary table: exception type | count | first seen | last seen
              - For each major exception type:
                - What the exception is and why it occurs
                - Which service/component/method is affected
                - Root cause analysis
                - Recommended fix (code change or config)
              - Overall severity assessment
              - Links to relevant Log Analytics workspace: $LOG_ANALYTICS_NAME ($LOG_ANALYTICS_RESOURCE_GROUP)

            ## Step 5 — Create a PR with fixes

            If you found relevant source code that can be fixed, create a branch named
            `fix/exceptions-<date>` and open a PR that:
            - Addresses the root causes identified in the issue
            - References the issue number in the PR description
            - Includes a clear description of each change and why it fixes the exception

            If no clear code fix can be determined, skip the PR and say so in the issue.
